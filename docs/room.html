<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office IoT Live Monitoring Blueprint</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --panel-bg: #111827;
            --border-color: #1f2937;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --blue-accent: #38bdf8;
            --yellow-accent: #fbbf24;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 24px;
        }

        .dashboard-layout {
            max-width: 1440px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 24px;
        }

        header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 16px;
        }

        h1 { margin: 0; font-size: 24px; font-weight: 600; color: #fff; }

        /* Metrics Grid */
        .metrics-grid {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        .metric-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .metric-title { font-size: 12px; color: var(--text-muted); text-transform: uppercase; font-weight: 600; letter-spacing: 0.05em; }
        .metric-val { font-size: 32px; font-weight: 700; color: var(--blue-accent); margin-top: 8px; }
        .metric-val.warn { color: #ef4444; }

        /* Left Side Blueprint Canvas */
        .map-container {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Right Side Controls & Alert Stream */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .control-block {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
        }

        .block-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #fff; border-bottom: 1px solid var(--border-color); padding-bottom: 8px;}

        .room-group { margin-bottom: 20px; }
        .room-title { font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 10px; text-transform: uppercase;}
        
        .switch-box { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }

        /* Interactive Grid Buttons */
        .btn {
            background: #1f2937;
            color: #d1d5db;
            border: 1px solid #374151;
            padding: 10px;
            font-size: 12px;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            transition: all 0.2s ease;
        }
        .btn:hover { background: #374151; }
        .btn.active-l { background: #eab308; color: #000; font-weight: 600; border-color: #facc15; }
        .btn.active-f { background: #06b6d4; color: #000; font-weight: 600; border-color: #22d3ee; }

        /* Alerts Engine */
        .alert-card {
            background: #7f1d1d;
            border-left: 4px solid #ef4444;
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 10px;
            color: #fee2e2;
        }
        .empty-alerts { color: #10b981; font-size: 14px; text-align: center; padding: 16px; }

        .time-badge { background: #1f2937; padding: 6px 12px; border-radius: 20px; font-size: 13px; font-family: monospace; color: var(--text-main); border: 1px solid var(--border-color); cursor: pointer;}

        /* --- STABLE CRITICAL SVG SPIN ANIMATIONS --- */
        @keyframes stable-spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .fan-blade-group {
            /* Forced relative anchor mapping axis point */
            transform-origin: 0px 0px; 
            animation: stable-spin 0.4s linear infinite;
            animation-play-state: paused;
        }

        /* State triggers controlled entirely via data context classes */
        .device-group.active-fan .fan-blade-group {
            animation-play-state: running;
        }

        .light-glow-cone {
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        .device-group.active-light .light-glow-cone {
            opacity: 1;
        }

        .hardware-bulb {
            fill: #4b5563;
            transition: fill 0.3s ease;
        }
        .device-group.active-light .hardware-bulb {
            fill: #fef08a;
            filter: drop-shadow(0 0 8px #facc15);
        }
    </style>
</head>
<body>

    <div class="dashboard-layout">
        <header>
            <div>
                <h1>Office Real-Time Layout Dashboard</h1>
                <div style="font-size: 13px; color: var(--text-muted); margin-top: 4px;">Dynamic Vector Map State Tracking</div>
            </div>
            <div id="clock-btn" class="time-badge" onclick="toggleTimeShift()">Office Hours: 02:30 PM</div>
        </header>

        <!-- Dynamic Live Calculations -->
        <div class="metrics-grid">
            <div class="metric-card"><div class="metric-title">Total Power Draw</div><div id="load-total" class="metric-val">0 W</div></div>
            <div class="metric-card"><div class="metric-title">Drawing Room Load</div><div id="load-drawing" class="metric-val">0 W</div></div>
            <div class="metric-card"><div class="metric-title">Work Room 1 Load</div><div id="load-work1" class="metric-val">0 W</div></div>
            <div class="metric-card"><div class="metric-title">Work Room 2 Load</div><div id="load-work2" class="metric-val">0 W</div></div>
        </div>

        <!-- Left Vector Map Frame -->
        <div class="map-container">
            <svg width="100%" height="100%" viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" style="background:#090d16; border:1px solid #1f2937; border-radius:8px;">
                <defs>
                    <radialGradient id="beam-glow" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" stop-color="#fef08a" stop-opacity="0.3" />
                        <stop offset="60%" stop-color="#eab308" stop-opacity="0.08" />
                        <stop offset="100%" stop-color="#eab308" stop-opacity="0" />
                    </radialGradient>
                </defs>

                <!-- Grid Blueprint Lines -->
                <g stroke="#111827" stroke-width="1">
                    <path d="M0,60 H900 M0,120 H900 M0,180 H900 M0,240 H900 M0,300 H900 M0,360 H900 M0,420 H900" />
                    <path d="M100,0 V480 M200,0 V480 M300,0 V480 M400,0 V480 M500,0 V480 M600,0 V480 M700,0 V480 M800,0 V480" />
                </g>

                <!-- Architectural Layout Walls -->
                <g stroke="#374151" stroke-width="4" stroke-linecap="round" fill="none">
                    <path d="M 20 400 L 20 20 L 880 20 L 880 400 L 750 400 M 650 400 L 480 400 M 380 400 L 210 400 M 110 400 L 20 400" />
                    <path d="M 300 20 L 300 400" />
                    <path d="M 590 20 L 590 400" />
                </g>

                <!-- Asset Outlines & Titles -->
                <text x="160" y="50" fill="#4b5563" font-size="12" font-weight="bold" letter-spacing="2" text-anchor="middle">DRAWING ROOM</text>
                <text x="445" y="50" fill="#4b5563" font-size="12" font-weight="bold" letter-spacing="2" text-anchor="middle">WORK ROOM 1</text>
                <text x="735" y="50" fill="#4b5563" font-size="12" font-weight="bold" letter-spacing="2" text-anchor="middle">WORK ROOM 2</text>
                <rect x="40" y="120" width="30" height="140" rx="4" fill="#111827" stroke="#1f2937" />

                <!-- === DEVICES HARDWARE ARRAYS === -->

                <!-- Drawing Room Hardware Nodes -->
                <g id="map-drawing-l1" class="device-group"><circle cx="80" cy="90" r="55" fill="url(#beam-glow)" class="light-glow-cone" /><circle cx="80" cy="90" r="10" class="hardware-bulb" /></g>
                <g id="map-drawing-l2" class="device-group"><circle cx="240" cy="90" r="55" fill="url(#beam-glow)" class="light-glow-cone" /><circle cx="240" cy="90" r="10" class="hardware-bulb" /></g>
                <g id="map-drawing-l3" class="device-group"><circle cx="160" cy="330" r="55" fill="url(#beam-glow)" class="light-glow-cone" /><circle cx="160" cy="330" r="10" class="hardware-bulb" /></g>
                
                <!-- Explicit Translation Isolation prevents wobbling -->
                <g id="map-drawing-f1" class="device-group" transform="translate(160, 130)">
                    <g class="fan-blade-group" stroke="#4b5563" stroke-width="5" stroke-linecap="round"><line x1="0" y1="0" x2="0" y2="-26" /><line x1="0" y1="0" x2="22" y2="13" /><line x1="0" y1="0" x2="-22" y2="13" /></g>
                    <circle cx="0" cy="0" r="6" fill="#000" stroke="#9ca3af" stroke-width="1.5" />
                </g>
                <g id="map-drawing-f2" class="device-group" transform="translate(160, 250)">
                    <g class="fan-blade-group" stroke="#4b5563" stroke-width="5" stroke-linecap="round"><line x1="0" y1="0" x2="0" y2="-26" /><line x1="0" y1="0" x2="22" y2="13" /><line x1="0" y1="0" x2="-22" y2="13" /></g>
                    <circle cx="0" cy="0" r="6" fill="#000" stroke="#9ca3af" stroke-width="1.5" />
                </g>

                <!-- Work Room 1 Hardware Nodes -->
                <g id="map-work1-l1" class="device-group"><circle cx="350" cy="90" r="55" fill="url(#beam-glow)" class="light-glow-cone" /><circle cx="350" cy="90" r="10" class="hardware-bulb" /></g>
                <g id="map-work1-l2" class="device-group"><circle cx="540" cy="90" r="55" fill="url(#beam-glow)" class="light-glow-cone" /><circle cx="540" cy="90" r="10" class="hardware-bulb" /></g>
                <g id="map-work1-l3" class="device-group"><circle cx="445" cy="330" r="55" fill="url(#beam-glow)" class="light-glow-cone" /><circle cx="445" cy="330" r="10" class="hardware-bulb" /></g>
                
                <g id="map-work1-f1" class="device-group" transform="translate(445, 130)">
                    <g class="fan-blade-group" stroke="#4b5563" stroke-width="5" stroke-linecap="round"><line x1="0" y1="0" x2="0" y2="-26" /><line x1="0" y1="0" x2="22" y2="13" /><line x1="0" y1="0" x2="-22" y2="13" /></g>
                    <circle cx="0" cy="0" r="6" fill="#000" stroke="#9ca3af" stroke-width="1.5" />
                </g>
                <g id="map-work1-f2" class="device-group" transform="translate(445, 250)">
                    <g class="fan-blade-group" stroke="#4b5563" stroke-width="5" stroke-linecap="round"><line x1="0" y1="0" x2="0" y2="-26" /><line x1="0" y1="0" x2="22" y2="13" /><line x1="0" y1="0" x2="-22" y2="13" /></g>
                    <circle cx="0" cy="0" r="6" fill="#000" stroke="#9ca3af" stroke-width="1.5" />
                </g>

                <!-- Work Room 2 Hardware Nodes -->
                <g id="map-work2-l1" class="device-group"><circle cx="640" cy="90" r="55" fill="url(#beam-glow)" class="light-glow-cone" /><circle cx="640" cy="90" r="10" class="hardware-bulb" /></g>
                <g id="map-work2-l2" class="device-group"><circle cx="830" cy="90" r="55" fill="url(#beam-glow)" class="light-glow-cone" /><circle cx="830" cy="90" r="10" class="hardware-bulb" /></g>
                <g id="map-work2-l3" class="device-group"><circle cx="735" cy="330" r="55" fill="url(#beam-glow)" class="light-glow-cone" /><circle cx="735" cy="330" r="10" class="hardware-bulb" /></g>
                
                <g id="map-work2-f1" class="device-group" transform="translate(735, 130)">
                    <g class="fan-blade-group" stroke="#4b5563" stroke-width="5" stroke-linecap="round"><line x1="0" y1="0" x2="0" y2="-26" /><line x1="0" y1="0" x2="22" y2="13" /><line x1="0" y1="0" x2="-22" y2="13" /></g>
                    <circle cx="0" cy="0" r="6" fill="#000" stroke="#9ca3af" stroke-width="1.5" />
                </g>
                <g id="map-work2-f2" class="device-group" transform="translate(735, 250)">
                    <g class="fan-blade-group" stroke="#4b5563" stroke-width="5" stroke-linecap="round"><line x1="0" y1="0" x2="0" y2="-26" /><line x1="0" y1="0" x2="22" y2="13" /><line x1="0" y1="0" x2="-22" y2="13" /></g>
                    <circle cx="0" cy="0" r="6" fill="#000" stroke="#9ca3af" stroke-width="1.5" />
                </g>
            </svg>
        </div>

        <!-- Right Side Interface Controls Panels -->
        <div class="sidebar">
            <div class="control-block">
                <div class="block-title">Active Out-of-Hours Alerts</div>
                <div id="alerts-stream"><div class="empty-alerts">✓ System normal</div></div>
            </div>

            <div class="control-block">
                <div class="block-title">Hardware Matrix Switches</div>
                <div id="switchbox-mount"></div>
            </div>
        </div>
    </div>

    <script>
        // Data Structure Matching Prompt Parameters
        const appState = {
            isNightShift: false,
            rooms: { drawing: "Drawing Room", work1: "Work Room 1", work2: "Work Room 2" },
            devices: {
                "drawing-l1": { label: "Light 1", type: "light", room: "drawing", active: false, watt: 15 },
                "drawing-l2": { label: "Light 2", type: "light", room: "drawing", active: false, watt: 15 },
                "drawing-l3": { label: "Light 3", type: "light", room: "drawing", active: false, watt: 15 },
                "drawing-f1": { label: "Fan 1", type: "fan", room: "drawing", active: false, watt: 60 },
                "drawing-f2": { label: "Fan 2", type: "fan", room: "drawing", active: false, watt: 60 },

                "work1-l1": { label: "Light 1", type: "light", room: "work1", active: false, watt: 15 },
                "work1-l2": { label: "Light 2", type: "light", room: "work1", active: false, watt: 15 },
                "work1-l3": { label: "Light 3", type: "light", room: "work1", active: false, watt: 15 },
                "work1-f1": { label: "Fan 1", type: "fan", room: "work1", active: false, watt: 60 },
                "work1-f2": { label: "Fan 2", type: "fan", room: "work1", active: false, watt: 60 },

                "work2-l1": { label: "Light 1", type: "light", room: "work2", active: false, watt: 15 },
                "work2-l2": { label: "Light 2", type: "light", room: "work2", active: false, watt: 15 },
                "work2-l3": { label: "Light 3", type: "light", room: "work2", active: false, watt: 15 },
                "work2-f1": { label: "Fan 1", type: "fan", room: "work2", active: false, watt: 60 },
                "work2-f2": { label: "Fan 2", type: "fan", room: "work2", active: false, watt: 60 }
            }
        };

        // Render Remote Buttons
        function initControlPanel() {
            const mount = document.getElementById("switchbox-mount");
            let buildOutput = "";

            for (let rId in appState.rooms) {
                buildOutput += `<div class="room-group"><div class="room-title">${appState.rooms[rId]}</div><div class="switch-box">`;
                for (let dId in appState.devices) {
                    let dev = appState.devices[dId];
                    if (dev.room === rId) {
                        buildOutput += `
                            <button id="ctrl-${dId}" class="btn" onclick="toggleDeviceState('${dId}')">
                                <span>${dev.label}</span>
                                <span id="lbl-${dId}">OFF</span>
                            </button>
                        `;
                    }
                }
                buildOutput += `</div></div>`;
            }
            mount.innerHTML = buildOutput;
        }

        // State Change Event Mutator
        function toggleDeviceState(id) {
            let item = appState.devices[id];
            item.active = !item.active;
            evaluateUIUpdate();
        }

        // Layout Core Evaluator
        function evaluateUIUpdate() {
            let totalSum = 0;
            let roomSums = { drawing: 0, work1: 0, work2: 0 };
            let activeAlerts = [];

            for (let id in appState.devices) {
                let dev = appState.devices[id];
                let elementGroup = document.getElementById(`map-${id}`);
                let triggerBtn = document.getElementById(`ctrl-${id}`);
                let badge = document.getElementById(`lbl-${id}`);

                if (dev.active) {
                    roomSums[dev.room] += dev.watt;
                    totalSum += dev.watt;

                    // Update UI Buttons and SVG Map Classes
                    badge.textContent = "ON";
                    if (dev.type === 'light') {
                        elementGroup.setAttribute("class", "device-group active-light");
                        triggerBtn.className = "btn active-l";
                    } else {
                        elementGroup.setAttribute("class", "device-group active-fan");
                        triggerBtn.className = "btn active-f";
                    }

                    // Check if device is left on during the simulated night shift (5 PM - 9 AM rule)
                    if (appState.isNightShift) {
                        activeAlerts.push(`[ALERT] ${appState.rooms[dev.room]} - ${dev.label} left ON after-hours!`);
                    }
                } else {
                    badge.textContent = "OFF";
                    triggerBtn.className = "btn";
                    elementGroup.setAttribute("class", "device-group");
                }
            }

            // Sync Value Counters
            document.getElementById("load-total").textContent = `${totalSum} W`;
            document.getElementById("load-drawing").textContent = `${roomSums.drawing} W`;
            document.getElementById("load-work1").textContent = `${roomSums.work1} W`;
            document.getElementById("load-work2").textContent = `${roomSums.work2} W`;

            // Adjust Power Warning Accent Indicators
            document.getElementById("load-total").className = `metric-val ${totalSum > 400 ? 'warn' : ''}`;

            // Sync Active Logs
            const alertBox = document.getElementById("alerts-stream");
            if (activeAlerts.length > 0) {
                alertBox.innerHTML = activeAlerts.map(txt => `<div class="alert-card">${txt}</div>`).join('');
            } else {
                alertBox.innerHTML = `<div class="empty-alerts">✓ System normal</div>`;
            }
        }

        // Toggle Time Shift (Office Hours vs. Night Shift Alert Conditions)
        function toggleTimeShift() {
            const timeBtn = document.getElementById("clock-btn");
            appState.isNightShift = !appState.isNightShift;
            
            if (appState.isNightShift) {
                timeBtn.textContent = "After Hours: 09:45 PM";
                timeBtn.style.borderColor = "#ef4444";
                timeBtn.style.color = "#fca5a5";
            } else {
                timeBtn.textContent = "Office Hours: 02:30 PM";
                timeBtn.style.borderColor = "var(--border-color)";
                timeBtn.style.color = "var(--text-main)";
            }
            evaluateUIUpdate();
        }

        // Run Build Routine
        initControlPanel();
        evaluateUIUpdate();
    </script>
</body>
</html>
