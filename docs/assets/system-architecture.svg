<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Huntrix office energy monitor system architecture</title>
  <desc id="desc">The office simulator creates frequent random device toggles while real Asia Dhaka time drives the 9 to 5 alert rule. A shared backend API feeds the dashboard, Discord bot, InstantDB snapshot, and OpenRouter AI summaries.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,8 L11,4 z" fill="#111827"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}
      .panel{fill:#ffffff;stroke:#cbd5e1;stroke-width:2}
      .device{fill:#eff6ff;stroke:#2563eb;stroke-width:2}
      .backend{fill:#f5f3ff;stroke:#7c3aed;stroke-width:2}
      .ui{fill:#ecfdf5;stroke:#059669;stroke-width:2}
      .alert{fill:#fff7ed;stroke:#ea580c;stroke-width:2}
      .title{font:700 26px system-ui,-apple-system,Segoe UI,sans-serif;fill:#0f172a}
      .h{font:700 18px system-ui,-apple-system,Segoe UI,sans-serif;fill:#0f172a}
      .b{font:500 14px system-ui,-apple-system,Segoe UI,sans-serif;fill:#475569}
      .s{font:700 12px system-ui,-apple-system,Segoe UI,sans-serif;fill:#334155;letter-spacing:.03em}
      .line{stroke:#111827;stroke-width:3.5;fill:none;marker-end:url(#arrow)}
      .soft{stroke:#64748b;stroke-width:2.5;fill:none;stroke-dasharray:7 7;marker-end:url(#arrow)}
    </style>
  </defs>

  <rect class="bg" width="1400" height="760" rx="30"/>
  <text x="60" y="72" class="title">Huntrix Office Energy Monitor - Shared Backend Architecture</text>
  <text x="60" y="104" class="b">One live state contract drives the floor plan, charts, alerts, Discord commands, and AI summaries.</text>

  <rect class="panel" x="50" y="145" width="250" height="330" rx="22"/>
  <text x="82" y="185" class="h">Office setup</text>
  <rect class="device" x="78" y="215" width="194" height="62" rx="14"/>
  <text x="100" y="241" class="h">Drawing Room</text>
  <text x="100" y="263" class="b">2 fans + 3 lights</text>
  <rect class="device" x="78" y="302" width="194" height="62" rx="14"/>
  <text x="100" y="328" class="h">Work Room 1</text>
  <text x="100" y="350" class="b">2 fans + 3 lights</text>
  <rect class="device" x="78" y="389" width="194" height="62" rx="14"/>
  <text x="100" y="415" class="h">Work Room 2</text>
  <text x="100" y="437" class="b">2 fans + 3 lights</text>

  <rect class="panel" x="360" y="145" width="290" height="330" rx="22"/>
  <text x="392" y="185" class="h">Simulated IoT layer</text>
  <rect class="device" x="388" y="215" width="234" height="62" rx="14"/>
  <text x="410" y="241" class="h">Device definitions</text>
  <text x="410" y="263" class="b">id, room, type, rated watts</text>
  <rect class="device" x="388" y="302" width="234" height="62" rx="14"/>
  <text x="410" y="328" class="h">Random toggle tick</text>
  <text x="410" y="350" class="b">visible changes about every 1.5s</text>
  <rect class="device" x="388" y="389" width="234" height="62" rx="14"/>
  <text x="410" y="415" class="h">Asia/Dhaka clock</text>
  <text x="410" y="437" class="b">real time, 9 to 5 rule</text>

  <rect class="panel" x="710" y="145" width="300" height="330" rx="22"/>
  <text x="742" y="185" class="h">Single backend</text>
  <rect class="backend" x="738" y="215" width="244" height="62" rx="14"/>
  <text x="760" y="241" class="h">GET /api/state</text>
  <text x="760" y="263" class="b">fresh EnergyState JSON</text>
  <rect class="alert" x="738" y="302" width="244" height="62" rx="14"/>
  <text x="760" y="328" class="h">Alert rules</text>
  <text x="760" y="350" class="b">after-hours, high-load, all-on</text>
  <rect class="backend" x="738" y="389" width="244" height="62" rx="14"/>
  <text x="760" y="415" class="h">InstantDB + OpenRouter</text>
  <text x="760" y="437" class="b">optional snapshot and AI text</text>

  <rect class="panel" x="1070" y="95" width="280" height="235" rx="22"/>
  <text x="1102" y="135" class="h">Web dashboard</text>
  <rect class="ui" x="1098" y="165" width="224" height="52" rx="14"/>
  <text x="1120" y="197" class="b">SVG floor plan animations</text>
  <rect class="ui" x="1098" y="235" width="224" height="52" rx="14"/>
  <text x="1120" y="267" class="b">Metrics, charts, alerts, hardware</text>

  <rect class="panel" x="1070" y="400" width="280" height="235" rx="22"/>
  <text x="1102" y="440" class="h">Discord bot</text>
  <rect class="ui" x="1098" y="470" width="224" height="52" rx="14"/>
  <text x="1120" y="502" class="b">!status !room !usage !advice</text>
  <rect class="alert" x="1098" y="540" width="224" height="52" rx="14"/>
  <text x="1120" y="572" class="b">proactive alert posts</text>

  <rect class="panel" x="395" y="565" width="530" height="98" rx="22"/>
  <text x="430" y="604" class="h">Shared state payload</text>
  <text x="430" y="632" class="b">generatedAt, simulatedClock, rooms, devices, watts, estimated kWh, active alerts</text>

  <path class="line" d="M300 310 H345"/>
  <path class="line" d="M650 310 H695"/>
  <path class="line" d="M860 475 V552"/>
  <path class="line" d="M1010 260 H1055"/>
  <path class="line" d="M1010 385 C1035 445 1045 500 1055 515"/>
  <path class="soft" d="M1210 330 V390"/>
  <path class="soft" d="M1210 400 V350"/>

  <text x="315" y="292" class="s">15 devices</text>
  <text x="665" y="292" class="s">state build</text>
  <text x="1032" y="242" class="s">polls 1.5s</text>
  <text x="1032" y="495" class="s">same API</text>
</svg>
